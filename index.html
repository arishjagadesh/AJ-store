<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ Store | Neural Hardware Provisioning</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent: #2874f0;
        }

        body { 
            background: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #1e293b; 
            overflow: hidden; 
        }

        /* 3D Product Cards */
        .product-node {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .product-node:hover {
            transform: translateY(-8px) rotateX(4deg) rotateY(4deg);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .node-active {
            background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%) !important;
            border: 2px solid var(--accent) !important;
            box-shadow: 0 10px 20px -5px rgba(40,116,240,0.2);
        }

        /* Billion-Dollar Buttons */
        .btn-provision {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-provision:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="shopSystem()" x-init="initAnimations(); fetchGlobalReviews()" class="h-screen flex flex-col">

    <header class="h-16 flex items-center px-10 justify-between backdrop-blur-md border-b border-white/20 z-50">
        <div class="flex items-center gap-4">
            <div class="bg-slate-900 text-white h-10 w-10 rounded-xl flex items-center justify-center font-black text-xl shadow-lg">A</div>
            <span class="font-black tracking-tighter text-2xl text-slate-900">AJ<span class="text-blue-600">STORE</span></span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">System Status</span>
                <span class="flex items-center gap-2 text-xs font-black text-green-600 uppercase">
                    <span class="h-1.5 w-1.5 bg-green-500 rounded-full animate-pulse"></span> Terminal Active
                </span>
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <aside class="w-1/4 min-w-[300px] border-r border-white/30 p-6 overflow-y-auto custom-scroll">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Hardware Inventory</h2>
            <div class="space-y-4" id="sidebar-list">
                <template x-for="product in products" :key="product.name">
                    <div @click="selectProduct(product)" 
                         :class="selectedProduct.name === product.name ? 'node-active' : ''"
                         class="product-node p-4 flex items-center gap-4 rounded-2xl cursor-pointer group">
                        <div class="h-16 w-16 bg-white rounded-xl p-2 shadow-inner group-hover:scale-110 transition-transform duration-500">
                            <img :src="product.images[0]" class="h-full w-full object-contain">
                        </div>
                        <div>
                            <h3 class="font-extrabold text-sm text-slate-800" x-text="product.name"></h3>
                            <p class="text-blue-600 font-bold text-xs" x-text="'₹' + product.basePrice.toLocaleString()"></p>
                        </div>
                    </div>
                </template>
            </div>
        </aside>

        <section class="flex-1 bg-white/40 flex flex-col items-center justify-center p-12 overflow-y-auto custom-scroll relative">
            <template x-if="!selectedProduct.name">
                <div class="text-center">
                    <div class="text-8xl mb-4 opacity-10 grayscale">📦</div>
                    <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Initialize Hardware Provisioning</p>
                </div>
            </template>

            <div x-show="selectedProduct.name" x-cloak class="w-full max-w-3xl" x-transition>
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <h1 class="text-5xl font-black text-slate-900 tracking-tighter" x-text="selectedProduct.name"></h1>
                        <div class="flex gap-2 mt-4">
                            <span class="bg-slate-900 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Aegis Protected</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-4xl font-black text-slate-900" x-text="'₹' + currentPrice.toLocaleString()"></p>
                        <p class="text-slate-400 line-through text-sm font-bold" x-text="'₹' + currentMrp.toLocaleString()"></p>
                    </div>
                </div>

                <div class="relative group mb-12">
                    <div class="absolute inset-0 bg-blue-400/10 blur-3xl rounded-full scale-75 group-hover:scale-100 transition-transform duration-700"></div>
                    <div class="relative bg-white/80 border border-white rounded-[40px] p-12 shadow-2xl overflow-hidden">
                        <img :src="activeImage" class="h-80 w-full object-contain hover:scale-105 transition-transform duration-700">
                    </div>
                </div>

                <div class="flex gap-4 justify-center mb-12">
                    <template x-for="img in selectedProduct.images">
                        <button @click="activeImage = img" class="h-20 w-20 rounded-2xl border-2 bg-white p-2 transition-all hover:border-blue-500" :class="activeImage === img ? 'border-blue-600' : 'border-transparent'">
                            <img :src="img" class="h-full w-full object-contain">
                        </button>
                    </template>
                </div>

                <p class="text-slate-500 font-medium leading-relaxed text-center mb-12" x-text="selectedProduct.fullDesc"></p>

                <div class="flex gap-4 mb-12">
                    <template x-for="opt in configs">
                        <button @click="selectedConfig = opt.size; updatePricing(opt.add)" 
                                :class="selectedConfig === opt.size ? 'bg-slate-900 text-white' : 'bg-white text-slate-600'"
                                class="flex-1 p-4 rounded-2xl border border-slate-200 font-bold transition-all shadow-sm">
                            <span class="block text-sm" x-text="opt.size"></span>
                            <span class="text-[10px] opacity-50" x-text="opt.add === 0 ? 'Standard' : '+ ₹' + opt.add.toLocaleString()"></span>
                        </button>
                    </template>
                </div>

                <button @click="modal = 'buy'" class="btn-provision w-full py-6 rounded-3xl font-black uppercase tracking-[0.2em] text-sm">Provision Hardware Node</button>
            </div>
        </section>

        <aside class="w-[30%] border-l border-white/30 flex flex-col bg-slate-50/50">
            <div class="p-8 border-b border-white/20 flex justify-between items-center">
                <h3 class="font-black text-slate-900 uppercase tracking-tighter">Neural Traces</h3>
                <button @click="modal = 'review'" class="bg-blue-600 text-white p-3 rounded-xl shadow-lg hover:rotate-6 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-8 space-y-6 custom-scroll">
                <template x-for="rev in filteredReviews()">
                    <div class="bg-white p-6 rounded-[28px] shadow-sm border border-slate-100 relative group overflow-hidden">
                        <div class="absolute top-0 right-0 p-3" x-show="rev.status === 'Verified'">
                            <span class="bg-green-100 text-green-700 text-[9px] font-black px-2 py-1 rounded-lg">AEGIS_VALIDATED</span>
                        </div>
                        <div class="flex items-center gap-3 mb-4">
                            <div class="h-10 w-10 bg-slate-100 rounded-full flex items-center justify-center font-bold text-slate-400" x-text="rev.email[0].toUpperCase()"></div>
                            <div>
                                <p class="text-xs font-black text-slate-800" x-text="rev.email"></p>
                                <p class="text-[9px] font-mono text-slate-400 uppercase" x-text="'Ref: ' + rev.order_id"></p>
                            </div>
                        </div>
                        <p class="text-slate-600 text-sm leading-relaxed italic" x-text="'“' + rev.review_text + '”'"></p>
                    </div>
                </template>
            </div>
        </aside>
    </main>

    <div x-show="modal === 'buy'" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-xl" x-cloak x-transition>
        <div class="bg-white w-full max-w-sm p-12 rounded-[40px] shadow-2xl">
            <h2 class="text-2xl font-black text-center mb-8 tracking-tighter">Secure Provisioning</h2>
            <div class="space-y-4">
                <input type="email" x-model="custEmail" placeholder="verified@gmail.com" class="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-blue-500 font-bold text-sm">
                <input type="password" x-model="masterCode" placeholder="Master Protocol Code" class="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-blue-500 text-center font-black tracking-[0.5em]">
            </div>
            <button @click="processPurchase()" :disabled="isProcessingBuy" class="btn-provision w-full mt-8 py-5 rounded-2xl font-black text-sm uppercase tracking-widest">
                <span x-show="!isProcessingBuy">Authorize Handshake</span>
                <span x-show="isProcessingBuy">Processing Protocol...</span>
            </button>
            <button @click="modal = null" class="w-full mt-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-red-500">Abort</button>
        </div>
    </div>

    <div x-show="modal === 'review'" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-xl" x-cloak x-transition>
        <div class="bg-white w-full max-w-lg p-12 rounded-[40px] shadow-2xl">
            <h2 class="text-3xl font-black mb-2 tracking-tighter">Submit Neural Trace</h2>
            <p class="text-slate-400 text-xs font-bold uppercase mb-8">Validating for: <span class="text-blue-600" x-text="selectedProduct.name"></span></p>
            <div class="space-y-4">
                <input type="text" x-model="reviewToken" placeholder="PRTC-TOKEN-ID" class="w-full p-5 rounded-2xl bg-slate-50 font-mono text-xs border-none outline-none focus:ring-2 ring-blue-500">
                <textarea x-model="reviewText" rows="4" placeholder="Input hardware telemetry (your feedback)..." class="w-full p-5 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-blue-500 text-sm font-medium"></textarea>
            </div>
            <button @click="submitReview()" :disabled="isProcessingReview" class="btn-provision w-full mt-8 py-5 rounded-2xl font-black text-sm uppercase tracking-widest">
                <span x-show="!isProcessingReview">Analyze & Vault</span>
                <span x-show="isProcessingReview">DeBERTa Processing...</span>
            </button>
            <button @click="modal = null" class="w-full mt-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-red-500">Close Interface</button>
        </div>
    </div>

    <script>
        const API = "https://aegis-engine.onrender.com";

        function shopSystem() {
            return {
                modal: null,
                selectedProduct: {},
                activeImage: '',
                selectedConfig: '256 GB',
                currentPrice: 0,
                currentMrp: 0,
                allReviews: [],
                custEmail: '',
                masterCode: '',
                reviewToken: '',
                reviewText: '',
                isProcessingBuy: false,
                isProcessingReview: false,
                configs: [{ size: '256 GB', add: 0 }, { size: '512 GB', add: 15000 }, { size: '1 TB', add: 35000 }],
                
                products: [
                    { name: 'iPhone 15 Pro Max', basePrice: 159900, baseMrp: 199900, fullDesc: 'Forged in titanium and featuring the groundbreaking A17 Pro chip. The ultimate flagship experience.', images: ['assets/iphone15.jpg', 'assets/iphone_15_pro.png'] },
                    { name: 'MacBook Pro M3 Max', basePrice: 349900, baseMrp: 399900, fullDesc: 'Mind-blowing performance for developers. Features a stunning 14-inch Liquid Retina XDR display.', images: ['assets/macbook-pro.png'] },
                    { name: 'Samsung S24 Ultra', basePrice: 129900, baseMrp: 149900, fullDesc: 'Galaxy AI is here. Epic search, stunning nightography, and the productivity of the integrated S-Pen.', images: ['assets/s24.jpg', 'assets/galaxy-s24.jpg'] },
                    { name: 'Apple Watch Ultra 2', basePrice: 89900, baseMrp: 99900, fullDesc: 'Rugged titanium frame, precision dual-frequency GPS, and up to 36 hours of battery life.', images: ['assets/apple-watch.jpg'] }
                ],

                initAnimations() {
                    gsap.from("#sidebar-list > div", {
                        duration: 1,
                        opacity: 0,
                        y: 30,
                        stagger: 0.2,
                        ease: "expo.out"
                    });
                },

                selectProduct(p) { 
                    this.selectedProduct = p; 
                    this.activeImage = p.images[0]; 
                    this.currentPrice = p.basePrice;
                    this.currentMrp = p.baseMrp;
                },

                updatePricing(addition) {
                    this.currentPrice = this.selectedProduct.basePrice + addition;
                    this.currentMrp = this.selectedProduct.baseMrp + addition;
                },

                filteredReviews() {
                    return this.allReviews.filter(r => r.product_name === this.selectedProduct.name);
                },

                async fetchGlobalReviews() {
                    try {
                        const res = await fetch(`${API}/api/admin/reviews`);
                        this.allReviews = await res.json();
                    } catch(e) { console.log("Backend offline"); }
                },

                async processPurchase() {
                    if (!this.custEmail.includes('@') || this.masterCode !== '22CSE011') return alert('❌ Handshake Denied');
                    this.isProcessingBuy = true;
                    try {
                        const res = await fetch(`${API}/api/checkout`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: this.custEmail, product: this.selectedProduct.name })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            alert(`✅ PROVISION SUCCESS\nToken: ${data.token}`);
                            this.modal = null;
                            this.reviewToken = data.token;
                        }
                    } catch (e) { alert("🚨 Engine Offline"); }
                    finally { this.isProcessingBuy = false; }
                },

                async submitReview() {
                    if (!this.reviewToken || !this.reviewText) return alert("Telemtry incomplete.");
                    this.isProcessingReview = true;
                    try {
                        const res = await fetch(`${API}/analyze-review`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ order_id: this.reviewToken, review_text: this.reviewText, product_name: this.selectedProduct.name, email: this.custEmail })
                        });
                        if (res.ok) {
                            alert("✅ Signal Vaulted.");
                            this.modal = null;
                            this.fetchGlobalReviews(); 
                        }
                    } catch(e) { alert("🚨 API Error"); }
                    finally { this.isProcessingReview = false; }
                }
            }
        }
    </script>
</body>
</html>
