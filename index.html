<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Secured Store | Neural Hardware</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent: #0f172a;
            --aegis-green: #10b981;
        }

        body { 
            background: radial-gradient(circle at top right, #f1f5f9, #e2e8f0);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #1e293b; 
            overflow: hidden; 
        }

        /* High-Grade Glassmorphism */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        /* Hardware Node Physics */
        .product-node {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }
        .product-node:hover {
            transform: perspective(1000px) translateY(-5px) scale(1.02);
            border-color: #3b82f6;
            box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.15);
        }
        .node-active {
            background: #ffffff !important;
            border: 2px solid #3b82f6 !important;
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.2);
        }

        /* Aegis Laser Scan Animation */
        .aegis-scan {
            position: relative;
            overflow: hidden;
        }
        .aegis-scan::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.2), transparent);
            animation: scan 3s infinite linear;
        }
        @keyframes scan { 100% { left: 200%; } }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="shopSystem()" x-init="initSystem()" class="h-screen flex flex-col">

    <header class="h-16 flex items-center px-8 justify-between glass-panel z-50 rounded-b-3xl mx-4 mt-2">
        <div class="flex items-center gap-3">
            <div class="bg-slate-900 text-white h-8 w-8 rounded-lg flex items-center justify-center font-black shadow-lg">AJ</div>
            <span class="font-black tracking-tighter text-xl text-slate-900 uppercase">Hardware <span class="text-blue-600">Protocol</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <span class="text-[8px] font-black text-slate-400 uppercase tracking-[0.3em] block mb-0.5">Aegis AI Core</span>
                <div class="flex items-center gap-2 text-[10px] font-bold text-green-600 uppercase">
                    <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></span> 
                    Real-Time Sync Active
                </div>
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden p-4 gap-4">
        
        <aside class="w-1/4 min-w-[300px] glass-panel rounded-3xl p-6 overflow-y-auto custom-scroll">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-6">Available Nodes</h2>
            <div class="space-y-4" id="inventory-list">
                <template x-for="product in products" :key="product.name">
                    <div @click="selectProduct(product)" 
                         :class="selectedProduct.name === product.name ? 'node-active' : 'bg-white/50 border-white/40'"
                         class="product-node p-4 flex items-center gap-4 rounded-2xl cursor-pointer border">
                        <div class="h-16 w-16 bg-white rounded-xl p-2 shadow-sm">
                            <img :src="product.images[0]" class="h-full w-full object-contain">
                        </div>
                        <div>
                            <h3 class="font-black text-xs text-slate-800" x-text="product.name"></h3>
                            <p class="text-blue-600 font-bold text-[10px] mt-1" x-text="'₹' + product.basePrice.toLocaleString()"></p>
                        </div>
                    </div>
                </template>
            </div>
        </aside>

        <section class="flex-1 glass-panel rounded-3xl flex flex-col items-center justify-center p-12 overflow-y-auto custom-scroll relative">
            <template x-if="!selectedProduct.name">
                <div class="text-center opacity-40">
                    <div class="text-6xl mb-4">🛡️</div>
                    <p class="text-slate-900 font-black uppercase tracking-[0.4em] text-xs">Select Hardware Node</p>
                </div>
            </template>

            <div x-show="selectedProduct.name" x-cloak class="w-full max-w-3xl" id="product-stage">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2" x-text="selectedProduct.name"></h1>
                        <div class="flex gap-2">
                            <span class="bg-slate-900 text-white px-3 py-1 rounded-md text-[8px] font-black uppercase tracking-widest">DeBERTa v3 Secured</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-3xl font-black text-blue-600" x-text="'₹' + currentPrice.toLocaleString()"></p>
                    </div>
                </div>

                <div class="relative bg-white/80 rounded-3xl p-12 mb-8 shadow-inner flex justify-center">
                    <img :src="activeImage" class="h-64 object-contain drop-shadow-2xl">
                </div>

                <button @click="modal = 'buy'" class="w-full bg-slate-900 hover:bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs transition-colors shadow-xl">
                    Initiate 100% Free Provisioning
                </button>
            </div>
        </section>

        <aside class="w-[30%] min-w-[350px] glass-panel rounded-3xl flex flex-col border-t-4 border-t-green-500 overflow-hidden">
            <div class="p-6 border-b border-white/20 flex justify-between items-center bg-white/40">
                <div>
                    <h3 class="font-black text-slate-900 uppercase tracking-tight text-sm">Aegis Threat Log</h3>
                    <p class="text-[9px] text-slate-500 uppercase tracking-widest mt-1">Live Database Feed</p>
                </div>
                <button @click="modal = 'review'" class="bg-slate-900 text-white p-3 rounded-xl shadow-lg hover:scale-105 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 space-y-4 custom-scroll bg-slate-50/50" id="trace-feed">
                <template x-for="rev in filteredReviews()" :key="rev._id">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative aegis-scan">
                        
                        <div class="absolute top-4 right-4 flex flex-col items-end">
                            <span class="text-[8px] font-black uppercase tracking-widest text-slate-400 mb-1">Confidence</span>
                            <div class="flex items-center gap-1">
                                <span class="font-mono text-xs font-black text-green-600" x-text="(rev.confidence_score * 100).toFixed(1) + '%'"></span>
                                <svg class="w-3 h-3 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 mb-3">
                            <div class="h-8 w-8 bg-slate-900 text-white rounded-lg flex items-center justify-center font-black text-xs shadow-inner" x-text="rev.email[0].toUpperCase()"></div>
                            <div>
                                <p class="text-xs font-black text-slate-900" x-text="rev.email"></p>
                                <p class="text-[9px] font-mono text-blue-500 uppercase tracking-widest" x-text="'PRTC: ' + rev.token"></p>
                            </div>
                        </div>
                        <p class="text-slate-600 text-xs leading-relaxed font-medium" x-text="rev.text"></p>
                    </div>
                </template>
                <div x-show="filteredReviews().length === 0" class="text-center py-10 opacity-40">
                    <p class="text-xs font-black uppercase tracking-widest">No verified traces yet.</p>
                </div>
            </div>
        </aside>
    </main>

    <div x-show="modal === 'buy'" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm" x-cloak x-transition>
        <div class="bg-white w-full max-w-sm p-8 rounded-3xl shadow-2xl">
            <h2 class="text-xl font-black text-center mb-6 uppercase tracking-widest">Verify Identity</h2>
            <div class="space-y-4">
                <input type="email" x-model="custEmail" placeholder="Target Email" class="w-full p-4 rounded-xl bg-slate-100 border-none font-bold text-xs outline-none focus:ring-2 ring-blue-500">
                <input type="password" x-model="masterCode" placeholder="System Override Code" class="w-full p-4 rounded-xl bg-slate-100 border-none text-center font-black text-xs tracking-widest outline-none focus:ring-2 ring-blue-500">
            </div>
            <button @click="processPurchase()" :disabled="isProcessingBuy" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">
                <span x-show="!isProcessingBuy">Generate PRTC Token</span>
                <span x-show="isProcessingBuy">Bypassing...</span>
            </button>
            <button @click="modal = null" class="w-full mt-4 text-[9px] font-black text-slate-400 uppercase tracking-widest hover:text-red-600">Abort</button>
        </div>
    </div>

    <div x-show="modal === 'review'" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm" x-cloak x-transition>
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h2 class="text-xl font-black mb-2 uppercase tracking-widest">Aegis Node Injection</h2>
            <p class="text-slate-400 text-[10px] font-black uppercase mb-6 tracking-widest">Target: <span class="text-blue-600" x-text="selectedProduct.name || 'Select a product first'"></span></p>
            <div class="space-y-4">
                <input type="text" x-model="reviewToken" placeholder="Enter PRTC Token" class="w-full p-4 rounded-xl bg-slate-100 font-mono text-xs border-none outline-none focus:ring-2 ring-blue-500">
                <textarea x-model="reviewText" rows="4" placeholder="Input analytical feedback..." class="w-full p-4 rounded-xl bg-slate-100 border-none outline-none focus:ring-2 ring-blue-500 text-xs font-medium"></textarea>
            </div>
            <button @click="submitReview()" :disabled="isProcessingReview || !selectedProduct.name" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">
                <span x-show="!isProcessingReview">Run DeBERTa Protocol</span>
                <span x-show="isProcessingReview">Analyzing Syntax...</span>
            </button>
            <button @click="modal = null" class="w-full mt-4 text-[9px] font-black text-slate-400 uppercase tracking-widest hover:text-red-600">Close</button>
        </div>
    </div>

    <script>
        // --- AEGIS SYSTEM CONFIGURATION ---
        const RENDER_API = "https://aegis-engine.onrender.com"; 
        
        // MongoDB Data API Variables 
        // Note: For a college presentation this is fine, but never leave API keys in client code for real SaaS.
        const MONGO_APP_ID = "YOUR_APP_ID_HERE"; 
        const MONGO_API_KEY = "YOUR_API_KEY_HERE"; 
        const MONGO_URL = `https://ap-south-1.aws.data.mongodb-api.com/app/${MONGO_APP_ID}/endpoint/data/v1/action/find`;

        function shopSystem() {
            return {
                modal: null,
                selectedProduct: {},
                activeImage: '',
                currentPrice: 0,
                allReviews: [],
                custEmail: '',
                masterCode: '',
                reviewToken: '',
                reviewText: '',
                isProcessingBuy: false,
                isProcessingReview: false,
                
                products: [
                    { name: 'iPhone 15 Pro Max', basePrice: 159900, images: ['https://pngimg.com/d/iphone_15_PNG21.png'] },
                    { name: 'MacBook Pro M3', basePrice: 349900, images: ['https://pngimg.com/d/macbook_PNG65.png'] },
                    { name: 'Samsung S24 Ultra', basePrice: 129900, images: ['https://assets.stickpng.com/images/65c49cf5369661dca725e227.png'] }
                ],

                initSystem() {
                    gsap.from("header", { duration: 1, y: -50, opacity: 0, ease: "power3.out" });
                    gsap.from(".product-node", { duration: 0.8, opacity: 0, x: -30, stagger: 0.1, ease: "power3.out", delay: 0.2 });
                    
                    this.fetchLiveReviews();
                    // Real-Time Polling Engine (Every 3 seconds)
                    setInterval(() => this.fetchLiveReviews(), 3000); 
                },

                selectProduct(p) { 
                    this.selectedProduct = p; 
                    this.activeImage = p.images[0]; 
                    this.currentPrice = p.basePrice;
                    gsap.from("#product-stage", { duration: 0.5, opacity: 0, y: 10, ease: "power2.out" });
                },

                filteredReviews() {
                    return this.allReviews.filter(r => r.product_name === this.selectedProduct.name);
                },

                // The MongoDB Real-Time Sync
                async fetchLiveReviews() {
                    if(!MONGO_APP_ID.includes("YOUR")) {
                        try {
                            const res = await fetch(MONGO_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'api-key': MONGO_API_KEY },
                                body: JSON.stringify({
                                    dataSource: "Cluster0",
                                    database: "Aegis_Internal",
                                    collection: "reviews",
                                    filter: { is_verified: true }, // AEGIS GATEKEEPER
                                    sort: { timestamp: -1 }
                                })
                            });
                            const data = await res.json();
                            if(data.documents && this.allReviews.length !== data.documents.length) {
                                this.allReviews = data.documents;
                                // Flash animation on new data
                                setTimeout(() => {
                                    gsap.from("#trace-feed > div", { duration: 0.5, opacity: 0, y: 20, stagger: 0.1 });
                                }, 100);
                            }
                        } catch(e) { console.error("Database connection dropped."); }
                    }
                },

                async processPurchase() {
                    if (this.masterCode !== '22CSE011') return alert('❌ PROTOCOL_ERROR: Invalid Overide');
                    this.isProcessingBuy = true;
                    // Simulating the backend PRTC Generation to save time
                    setTimeout(() => {
                        const fakeToken = "PRTC-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                        alert(`✅ PROVISION_SUCCESS\n\nYour PRTC token is: ${fakeToken}\n(Normally emailed via Brevo)`);
                        this.reviewToken = fakeToken;
                        this.modal = null;
                        this.isProcessingBuy = false;
                    }, 1500);
                },

                async submitReview() {
                    if (!this.reviewToken || !this.reviewText) return;
                    this.isProcessingReview = true;
                    try {
                        // Send to your Render API for DeBERTa Analysis
                        const res = await fetch(`${RENDER_API}/analyze`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ 
                                text: this.reviewText,
                                token: this.reviewToken,
                                email: this.custEmail || "admin@aegis.com",
                                product: this.selectedProduct.name
                            })
                        });
                        if (res.ok) {
                            alert("✅ DEBERTA_VERIFIED: Trace indexed to MongoDB.");
                            this.modal = null;
                            this.reviewText = '';
                            this.fetchLiveReviews(); 
                        } else {
                            alert("❌ THREAT_DETECTED: Deceptive syntax blocked.");
                        }
                    } catch(e) { 
                        alert("🚨 API_OFFLINE: Is Render awake?"); 
                    }
                    finally { this.isProcessingReview = false; }
                }
            }
        }
    </script>
</body>
</html>
